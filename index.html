<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAMPギア管理アプリ</title>
    <link rel="icon" type="image/png" href="public/top.png">
    <link rel="apple-touch-icon" href="public/top.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --bg:#F0EAE0; --bg-card:#FFFDF7; --bg-header:#3D2C1E;
            --text-primary:#2D1F14; --text-secondary:#6B5440; --text-muted:#9A876F;
            --accent-brown:#7A5C38; --accent-khaki:#6B7A3A;
            --border:#D4C4B0; --shadow:rgba(61,44,30,0.14);
            --green-bg:#EBF5E1; --green-border:#A8C98A; --green-text:#3D6E1A;
            --warn-bg:#FFF8E6; --warn-border:#E8C866; --warn-text:#7A5A0A;
            --danger:#CC2A2A;
        }
        body {
            font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;
            background:var(--bg); color:var(--text-primary);
            max-width:430px; margin:0 auto; min-height:100vh; overflow-x:hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background:var(--bg-header); color:white; padding:14px 16px;
            display:flex; align-items:center; gap:8px;
            position:sticky; top:0; z-index:200; box-shadow:0 2px 10px var(--shadow);
        }
        .header-back {
            background:rgba(255,255,255,0.12); border:none; color:white;
            font-size:20px; cursor:pointer; padding:6px 10px; border-radius:10px;
            line-height:1; display:none;
        }
        .header-title { font-size:17px; font-weight:700; flex:1; letter-spacing:0.3px; }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position:fixed; bottom:0; left:50%; transform:translateX(-50%);
            width:100%; max-width:430px; background:var(--bg-header);
            display:flex; justify-content:space-around; align-items:flex-start;
            padding:10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index:200; box-shadow:0 -2px 10px var(--shadow);
        }
        .nav-item {
            display:flex; flex-direction:column; align-items:center; gap:4px;
            cursor:pointer; color:rgba(255,255,255,0.5); padding:4px 10px;
            border-radius:10px; min-width:60px;
        }
        .nav-item.active { color:#E8D5B0; }
        .nav-icon { font-size:22px; line-height:1; }
        .nav-label { font-size:10px; font-weight:600; white-space:nowrap; }

        /* ===== SCREENS ===== */
        .screen { display:none; padding:14px 14px 90px; }
        .screen.active { display:block; animation:fadeIn 0.2s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

        /* ===== GENERIC CARD ===== */
        .card {
            background:var(--bg-card); border-radius:16px; padding:16px;
            margin-bottom:12px; box-shadow:0 2px 8px var(--shadow); border:1px solid var(--border);
        }

        /* ===== HOME ===== */
        .home-hero {
            background:linear-gradient(135deg,#3D2C1E 0%,#7A6B4A 60%,#9A8B6A 100%);
            border-radius:20px; padding:24px 20px 20px; margin-bottom:16px;
            color:white; position:relative; overflow:hidden;
        }
        .home-hero::before {
            content:"🏕️"; position:absolute; right:16px; bottom:8px;
            font-size:70px; opacity:0.22; pointer-events:none;
        }
        .home-hero h1 { font-size:20px; font-weight:800; margin-bottom:5px; line-height:1.3; }
        .home-hero p  { font-size:12px; opacity:0.8; }
        .home-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
        .stat-card {
            background:var(--bg-card); border-radius:14px; padding:14px 8px;
            text-align:center; box-shadow:0 2px 6px var(--shadow); border:1px solid var(--border);
        }
        .stat-number { font-size:30px; font-weight:800; color:var(--accent-brown); line-height:1; }
        .stat-label  { font-size:11px; color:var(--text-muted); margin-top:4px; }
        .section-title { font-size:15px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
        .quick-menu { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px; }
        .quick-btn {
            background:var(--bg-card); border-radius:16px; padding:18px 14px;
            display:flex; flex-direction:column; gap:6px; cursor:pointer;
            box-shadow:0 2px 6px var(--shadow); border:1px solid var(--border); transition:transform 0.1s;
        }
        .quick-btn:active { transform:scale(0.96); }
        .quick-btn-icon { font-size:30px; line-height:1; }
        .quick-btn-text { font-size:15px; font-weight:700; }
        .quick-btn-sub  { font-size:11px; color:var(--text-muted); }

        /* ===== GEAR LIST ===== */
        .add-gear-btn {
            width:100%; background:var(--bg-header); color:white; border:none;
            border-radius:16px; padding:15px; font-size:16px; font-weight:800;
            cursor:pointer; font-family:inherit; display:flex; align-items:center;
            justify-content:center; gap:8px; margin-bottom:14px; transition:opacity 0.15s;
        }
        .add-gear-btn:active { opacity:0.85; }

        .search-bar {
            background:var(--bg-card); border:2px solid var(--border);
            border-radius:14px; padding:12px 16px; width:100%;
            font-size:15px; color:var(--text-primary); margin-bottom:12px;
            outline:none; font-family:inherit;
        }
        .search-bar:focus { border-color:var(--accent-brown); }

        .gear-filter {
            display:flex; gap:8px; margin-bottom:14px;
            overflow-x:auto; padding-bottom:4px; scrollbar-width:none;
        }
        .gear-filter::-webkit-scrollbar { display:none; }
        .filter-btn {
            background:var(--bg-card); border:2px solid var(--border);
            border-radius:20px; padding:7px 14px; font-size:13px; font-weight:600;
            color:var(--text-secondary); cursor:pointer; white-space:nowrap;
            font-family:inherit; transition:all 0.15s;
        }
        .filter-btn.active { background:var(--bg-header); border-color:var(--bg-header); color:white; }

        /* Standard gear card */
        .gear-card {
            background:var(--bg-card); border-radius:16px; padding:14px 16px;
            margin-bottom:10px; box-shadow:0 2px 8px var(--shadow); border:1px solid var(--border);
            display:flex; align-items:center; gap:14px;
            cursor:pointer; transition:transform 0.1s;
        }
        .gear-card:active { transform:scale(0.98); }
        .gear-emoji {
            font-size:34px; min-width:52px; text-align:center;
            background:var(--bg); border-radius:12px; padding:8px 6px; line-height:1.1;
        }
        .gear-info { flex:1; min-width:0; }
        .gear-name  { font-size:15px; font-weight:700; margin-bottom:2px; }
        .gear-maker { font-size:12px; color:var(--text-muted); margin-bottom:6px; }
        .tag {
            display:inline-block; background:var(--bg); border:1px solid var(--border);
            border-radius:6px; padding:2px 8px; font-size:11px; color:var(--text-secondary); font-weight:600;
        }
        .gear-storage { font-size:11px; color:var(--text-muted); margin-left:6px; }
        .gear-card-actions { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; }
        .gear-edit-btn {
            background:var(--bg); border:1.5px solid var(--border); color:var(--text-muted);
            font-size:15px; width:32px; height:32px; border-radius:8px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:all 0.15s;
        }
        .gear-edit-btn:active { background:var(--border); }
        .gear-arrow { color:var(--text-muted); font-size:20px; }

        /* ===== TENT CARD ===== */
        .tent-card {
            background:var(--bg-card); border-radius:18px; overflow:hidden;
            margin-bottom:12px; box-shadow:0 3px 12px var(--shadow); border:1px solid var(--border);
            cursor:pointer; transition:transform 0.1s;
        }
        .tent-card:active { transform:scale(0.97); }
        .tent-photo {
            height:118px; display:flex; align-items:center; justify-content:center;
            font-size:62px; line-height:1; position:relative;
        }
        .tent-photo-label {
            position:absolute; top:10px; left:12px;
            background:rgba(0,0,0,0.35); color:white; font-size:10px; font-weight:700;
            padding:3px 8px; border-radius:6px; letter-spacing:0.3px;
        }
        .tent-photo-edit {
            position:absolute; top:10px; right:12px;
            background:rgba(255,255,255,0.18); border:1.5px solid rgba(255,255,255,0.4);
            color:white; font-size:14px; padding:4px 8px; border-radius:8px;
            cursor:pointer; font-family:inherit; font-weight:600;
        }
        .tent-photo-edit:active { background:rgba(255,255,255,0.32); }
        .tent-card-body { padding:14px; }
        .tent-card-maker   { font-size:11px; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:3px; }
        .tent-card-name    { font-size:17px; font-weight:800; color:var(--text-primary); margin-bottom:5px; }
        .tent-card-tagline { font-size:13px; color:var(--text-secondary); margin-bottom:11px; line-height:1.5; }
        .tent-card-footer  { display:flex; justify-content:space-between; align-items:center; }
        .tent-card-storage { font-size:12px; color:var(--text-muted); }
        .tent-tags-row     { display:flex; flex-wrap:wrap; gap:5px; }
        .tent-tag-pill { border-radius:8px; padding:3px 8px; font-size:10px; font-weight:700; white-space:nowrap; }

        /* ===== COMPARISON ===== */
        .comparison-card {
            background:linear-gradient(135deg,#3D2C1E 0%,#7A6040 100%);
            border-radius:18px; padding:18px; margin-bottom:14px; box-shadow:0 3px 12px var(--shadow);
        }
        .comparison-title    { font-size:18px; font-weight:800; color:white; margin-bottom:4px; }
        .comparison-subtitle { font-size:12px; color:rgba(255,255,255,0.7); margin-bottom:14px; }
        .comp-tags-row       { display:flex; flex-wrap:wrap; gap:8px; }
        .comp-tag {
            background:rgba(255,255,255,0.14); border:1.5px solid rgba(255,255,255,0.35);
            border-radius:20px; padding:7px 14px; font-size:13px; font-weight:600;
            color:rgba(255,255,255,0.82); cursor:pointer; font-family:inherit; transition:all 0.2s; white-space:nowrap;
        }
        .comp-tag.active { background:rgba(255,255,255,0.93); color:#3D2C1E; border-color:white; }
        .comp-match-count { font-size:12px; color:rgba(255,255,255,0.65); margin-top:10px; }

        /* ===== GEAR DETAIL ===== */
        .gear-detail-hero {
            background:linear-gradient(135deg,#4A3525 0%,#8B7A5A 100%);
            border-radius:20px; padding:22px 18px; margin-bottom:14px;
            color:white; display:flex; align-items:center; gap:16px;
        }
        .gear-detail-emoji   { font-size:54px; line-height:1; }
        .gear-detail-name    { font-size:20px; font-weight:800; margin-bottom:4px; }
        .gear-detail-sub     { font-size:13px; opacity:0.8; }
        .gear-detail-tagline { font-size:14px; opacity:0.85; margin-top:6px; line-height:1.5; }
        .detail-section {
            background:var(--bg-card); border-radius:16px; padding:16px;
            margin-bottom:12px; box-shadow:0 2px 8px var(--shadow); border:1px solid var(--border);
        }
        .detail-section-title { font-size:14px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:6px; }

        /* Tent stats */
        .tent-stats-row { display:flex; gap:10px; margin-bottom:12px; }
        .tent-stat-block {
            flex:1; background:var(--bg-card); border-radius:14px; padding:14px 10px;
            text-align:center; border:1px solid var(--border); box-shadow:0 2px 6px var(--shadow);
        }
        .tent-stat-label { font-size:11px; color:var(--text-muted); font-weight:600; margin-bottom:6px; }
        .tent-stat-stars { font-size:20px; color:var(--accent-brown); letter-spacing:2px; }
        .tent-stat-value { font-size:16px; font-weight:800; color:var(--accent-brown); }

        .info-row {
            display:flex; justify-content:space-between; align-items:baseline;
            gap:12px; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px;
        }
        .info-row:last-child { border-bottom:none; padding-bottom:0; }
        .info-label { color:var(--text-muted); font-weight:600; flex-shrink:0; }
        .info-value { color:var(--text-primary); font-weight:500; text-align:right; word-break:break-all; }

        .step-list { list-style:none; display:flex; flex-direction:column; gap:10px; }
        .step-item { display:flex; gap:12px; align-items:flex-start; }
        .step-num {
            min-width:28px; height:28px; background:var(--bg-header); color:white;
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:13px; font-weight:700; flex-shrink:0;
        }
        .step-text { font-size:14px; line-height:1.65; padding-top:4px; }
        .caution-box {
            background:var(--warn-bg); border:1px solid var(--warn-border);
            border-radius:12px; padding:14px; display:flex; gap:10px;
        }
        .caution-icon { font-size:18px; flex-shrink:0; }
        .caution-text { font-size:13px; color:var(--warn-text); line-height:1.7; }
        .video-note  { background:var(--bg); border-radius:12px; padding:14px; font-size:13px; color:var(--text-secondary); line-height:1.7; white-space:pre-line; }
        .features-text { font-size:14px; color:var(--text-primary); line-height:1.75; white-space:pre-line; }

        /* Detail action bar */
        .detail-actions { display:flex; gap:10px; margin-bottom:20px; }
        .btn-detail-edit {
            flex:1; background:var(--bg-card); border:2px solid var(--border);
            border-radius:14px; padding:14px; font-size:15px; font-weight:700;
            color:var(--text-secondary); cursor:pointer; font-family:inherit; transition:opacity 0.15s;
        }
        .btn-detail-edit:active { opacity:0.8; }
        .btn-detail-delete {
            background:var(--danger); color:white; border:none;
            border-radius:14px; padding:14px 18px; font-size:15px; font-weight:700;
            cursor:pointer; font-family:inherit; transition:opacity 0.15s;
        }
        .btn-detail-delete:active { opacity:0.8; }

        /* ===== PDF LIST ===== */
        .pdf-card {
            background:var(--bg-card); border-radius:16px; padding:14px 16px; margin-bottom:10px;
            box-shadow:0 2px 8px var(--shadow); border:1px solid var(--border);
            display:flex; align-items:center; gap:14px;
        }
        .pdf-icon     { font-size:34px; min-width:40px; text-align:center; }
        .pdf-info     { flex:1; min-width:0; }
        .pdf-name     { font-size:14px; font-weight:700; margin-bottom:2px; }
        .pdf-maker    { font-size:12px; color:var(--text-muted); }
        .pdf-filename { font-size:11px; color:var(--text-muted); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .pdf-btn {
            background:var(--bg-header); color:white; border:none; border-radius:10px;
            padding:9px 14px; font-size:13px; font-weight:700; cursor:pointer;
            font-family:inherit; flex-shrink:0;
        }
        .pdf-status-badge {
            display:inline-block; border-radius:8px; padding:3px 9px;
            font-size:11px; font-weight:700; margin-top:6px;
        }
        .pdf-status-badge.registered   { background:var(--green-bg); color:var(--green-text); border:1px solid var(--green-border); }
        .pdf-status-badge.unregistered { background:#F0EDEA; color:var(--text-muted); border:1px solid var(--border); }
        .pdf-count-row { display:flex; gap:10px; margin-bottom:14px; }
        .pdf-count-block {
            flex:1; background:var(--bg-card); border-radius:14px; padding:14px 10px;
            text-align:center; box-shadow:0 2px 6px var(--shadow); border:1px solid var(--border);
        }
        .pdf-count-num   { font-size:26px; font-weight:800; line-height:1; }
        .pdf-count-label { font-size:11px; color:var(--text-muted); margin-top:5px; }

        /* ===== CHECKLIST ===== */
        .check-progress { background:var(--bg-card); border-radius:16px; padding:18px; margin-bottom:16px; box-shadow:0 2px 8px var(--shadow); border:1px solid var(--border); }
        .progress-num   { font-size:32px; font-weight:800; color:var(--accent-khaki); line-height:1; }
        .progress-sub   { font-size:13px; color:var(--text-muted); margin-top:3px; }
        .progress-bar-bg { background:var(--bg); border-radius:8px; height:12px; margin:12px 0 0; overflow:hidden; }
        .progress-bar    { background:linear-gradient(90deg,var(--accent-khaki),#8FBF5A); height:100%; border-radius:8px; transition:width 0.4s ease; }
        .cat-header      { font-size:14px; font-weight:700; margin:16px 0 8px; display:flex; align-items:center; gap:6px; }
        .check-item {
            background:var(--bg-card); border-radius:12px; padding:13px 14px; margin-bottom:7px;
            box-shadow:0 1px 4px var(--shadow); border:1.5px solid var(--border);
            display:flex; align-items:center; gap:13px; cursor:pointer; transition:background 0.2s, border-color 0.2s;
        }
        .check-item.checked { background:var(--green-bg); border-color:var(--green-border); }
        .check-box {
            width:26px; height:26px; border-radius:7px; border:2px solid var(--border);
            display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; transition:all 0.2s;
        }
        .check-item.checked .check-box { background:var(--accent-khaki); border-color:var(--accent-khaki); color:white; }
        .check-text { font-size:15px; font-weight:600; }
        .check-item.checked .check-text { text-decoration:line-through; color:var(--text-muted); }
        .reset-btn {
            background:var(--bg-card); border:2px solid var(--border); border-radius:14px;
            padding:14px; width:100%; font-size:15px; font-weight:700;
            color:var(--text-secondary); cursor:pointer; margin-top:8px; font-family:inherit;
        }

        /* ===== GARAGE ===== */
        .map-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .map-cell { background:#D4C4B0; border-radius:12px; padding:12px 10px; text-align:center; cursor:pointer; transition:background 0.15s; }
        .map-cell:active { background:#C4B090; }
        .map-cell.full    { grid-column:1/-1; }
        .map-cell-icon { font-size:18px; margin-bottom:4px; }
        .map-cell-name { font-size:13px; font-weight:700; color:#3D2C1E; }
        .map-cell-desc { font-size:10px; color:#7A6B4A; margin-top:2px; }

        .garage-area { background:var(--bg-card); border-radius:16px; padding:16px; margin-bottom:10px; box-shadow:0 2px 8px var(--shadow); border:2px solid var(--border); cursor:pointer; transition:border-color 0.15s; }
        .garage-area.expanded { border-color:var(--accent-brown); }
        .area-header  { display:flex; justify-content:space-between; align-items:center; }
        .area-title   { display:flex; align-items:center; gap:10px; font-size:16px; font-weight:700; }
        .area-icon    { font-size:22px; }
        .area-desc    { font-size:12px; font-weight:400; color:var(--text-muted); margin-top:1px; }
        .area-badge   { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:3px 10px; font-size:12px; color:var(--text-muted); font-weight:600; }
        .area-chevron { transition:transform 0.2s; color:var(--text-muted); font-size:18px; margin-left:6px; }
        .garage-area.expanded .area-chevron { transform:rotate(90deg); }
        .area-items   { display:none; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); flex-direction:column; gap:8px; }
        .garage-area.expanded .area-items { display:flex; }
        .area-item    { display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--bg); border-radius:12px; cursor:pointer; transition:background 0.1s; }
        .area-item:active { background:var(--border); }
        .area-item-emoji { font-size:22px; }
        .area-item-name  { font-size:14px; font-weight:700; }
        .area-item-meta  { font-size:12px; color:var(--text-muted); }
        .area-item-arrow { color:var(--text-muted); font-size:16px; margin-left:auto; }

        /* ===== GEAR EDIT FORM ===== */
        .form-section {
            background:var(--bg-card); border-radius:16px; padding:18px;
            margin-bottom:12px; box-shadow:0 2px 8px var(--shadow); border:1px solid var(--border);
        }
        .form-section-title { font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:14px; }
        .form-field { margin-bottom:16px; }
        .form-field:last-child { margin-bottom:0; }
        .form-label { display:block; font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:7px; }
        .form-label .req { color:var(--danger); }
        .form-hint  { font-size:11px; color:var(--text-muted); margin-top:5px; line-height:1.5; }
        .form-input {
            width:100%; background:var(--bg); border:2px solid var(--border);
            border-radius:12px; padding:13px 14px; font-size:15px; color:var(--text-primary);
            font-family:inherit; outline:none; transition:border-color 0.2s;
        }
        .form-input:focus { border-color:var(--accent-brown); }
        textarea.form-input { resize:none; line-height:1.65; }
        .form-select {
            width:100%; background:var(--bg); border:2px solid var(--border);
            border-radius:12px; padding:13px 14px; font-size:15px; color:var(--text-primary);
            font-family:inherit; outline:none; appearance:none;

        }
        .btn-form-delete:active { opacity:0.8; }

        /* Reset link */
        .reset-demo-btn {
            background:none; border:none; color:var(--text-muted);

function loadGears() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT_GEARS));
}

function saveGears() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(gears));
}

function generateId() {
    return 'u_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2,5);
}

// ============================================================
// HELPERS
// ============================================================
function starsHTML(n, max=5) {
    return '★'.repeat(n) + '<span style="opacity:0.22;">★</span>'.repeat(max-n);
}

function tentTagPills(tags) {
    if (!tags || !tags.length) return '';
    return tags.map(t => {
        const d = TENT_TAG_DEF[t]; if (!d) return '';
        return `<span class="tent-tag-pill" style="background:${d.bg};color:${d.color};">${d.label}</span>`;
    }).join('');
}

function esc(s) {
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function videoNoteHTML(text) {
    return (text||'').split('\n').map(line => {
        const trimmed = line.trim();
        if (/^https?:\/\/\S+$/.test(trimmed)) {
            const url = esc(trimmed);
            return `<a href="${url}" target="_blank" rel="noopener" style="color:var(--accent-brown);word-break:break-all;text-decoration:underline;">${url}</a>`;
        }
        return esc(line);
    }).join('\n');
}

function textareaToSteps(text) {
    return (text||'').split('\n').map(s=>s.trim()).filter(s=>s.length>0);
}

function stepsToTextarea(steps) {
    return (steps||[]).join('\n');
}

const SCREEN_META = {
    'home':        { title:'🏕️ CAMPギア管理',      nav:'nav-home',      back:false },
    'gear-list':   { title:'🎒 ギア一覧',           nav:'nav-gear-list', back:false },
    'gear-detail': { title:'🔍 ギア詳細',           nav:'nav-gear-list', back:true  },
    'gear-edit':   { title:'✏️ ギアを編集',         nav:'nav-gear-list', back:true  },
    'pdf-list':    { title:'📄 取説・PDFリスト',    nav:'nav-pdf-list',  back:false },
    'checklist':   { title:'✅ 持ち物チェック',      nav:'nav-checklist', back:false },
    'garage':      { title:'🏠 ガレージ収納マップ', nav:'nav-garage',    back:false },
};
let historyStack = [];
let currentScreen = 'home';

function navTo(name) {
    historyStack = [];
    compTags.clear();
    document.querySelectorAll('.comp-tag').forEach(b=>b.classList.remove('active'));
    _activate(name);
}

function pushScreen(name) {
    historyStack.push(currentScreen);
    _activate(name);
}

function goBack() {
    const prev = historyStack.pop() || 'gear-list';
    _activate(prev);
}

function _activate(name) {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+name).classList.add('active');
    currentScreen = name;
    const meta = SCREEN_META[name];
    document.getElementById('header-title').textContent = meta.title;
    document.getElementById('back-btn').style.display = meta.back ? 'block' : 'none';
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById(meta.nav).classList.add('active');
    window.scrollTo(0,0);
}

    const tents = gears.filter(g=>g.category==='テント');

}

    const n        = gears.length;
    const pdfCount = gears.filter(g => !!getPDFPath(g)).length;
    document.getElementById('home-gear-count').textContent = n;
    document.getElementById('home-pdf-count').textContent  = pdfCount;
    document.getElementById('qm-gear-sub').textContent     = n + '点登録中';
    document.getElementById('qm-pdf-sub').textContent      = pdfCount + '冊登録済み';
}

function rebuildFilterBar() {
    const cats = [...new Set(gears.map(g=>g.category).filter(Boolean))].sort();
    const fb = document.getElementById('filter-bar');
    const activeCat = filterCat;
    fb.innerHTML = `<button class="filter-btn${activeCat==='all'?' active':''}" data-cat="all" onclick="setFilter(this,this.dataset.cat)">すべて</button>` +
        cats.map(c=>`<button class="filter-btn${activeCat===c?' active':''}" data-cat="${esc(c)}" onclick="setFilter(this,this.dataset.cat)">${CAT_ICONS[c]||'📋'} ${esc(c)}</button>`).join('');
}

function setFilter(btn, cat) {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filterCat = cat;
    if (cat !== 'テント') {
        compTags.clear();
        document.querySelectorAll('.comp-tag').forEach(b=>b.classList.remove('active'));
    }
    document.getElementById('comparison-section').style.display = cat==='テント' ? 'block' : 'none';
    renderGearList();
}

function toggleCompTag(btn) {
    const tag = btn.dataset.tag;
    if (compTags.has(tag)) { compTags.delete(tag); btn.classList.remove('active'); }
    else                   { compTags.add(tag);    btn.classList.add('active'); }
    renderGearList();
}

function renderGearList() {
    const search = (document.getElementById('gear-search').value||'').trim();
    let filtered = gears.filter(g=>{
        const matchCat    = filterCat==='all' || g.category===filterCat;
        const matchSearch = !search || (g.name||'').includes(search) || (g.maker||'').includes(search);
        return matchCat && matchSearch;
    });
    if (filterCat==='テント' && compTags.size>0) {
        filtered = filtered.filter(g=>g.tentTags && g.tentTags.some(t=>compTags.has(t)));
    }
    const countEl = document.getElementById('comp-match-count');
    if (filterCat==='テント' && compTags.size>0) countEl.textContent = filtered.length+'件のテントがマッチしました';
    else countEl.textContent = '';

    const container = document.getElementById('gear-list-items');
    if (!filtered.length) {
        container.innerHTML = '<div class="card" style="text-align:center;color:var(--text-muted);padding:40px 16px;">該当するギアがありません</div>';
        return;
    }
    container.innerHTML = filtered.map(g => g.category==='テント' ? tentCardHTML(g) : gearCardHTML(g)).join('');
}

    return `
    <div class="tent-card" onclick="showGearDetail('${g.id}')">
        <div class="tent-photo" style="background:${g.photoGradient||'linear-gradient(135deg,#8B6B4A,#4A2E18)'};">
            <div style="filter:drop-shadow(0 3px 8px rgba(0,0,0,0.35));font-size:62px;line-height:1;">${esc(g.emoji||'⛺')}</div>

    const g = gears.find(x=>x.id===id); if(!g) return;
    historyStack.push(currentScreen);
    document.getElementById('gear-detail-content').innerHTML =
        g.category==='テント' ? buildTentDetail(g) : buildStandardDetail(g);
    _activate('gear-detail');
}

function confirmDeleteGear(id) {
    const g = gears.find(x=>x.id===id); if(!g) return;
    if (!confirm(`「${g.name}」を削除しますか？\n\nこの操作は元に戻せません。`)) return;
    gears = gears.filter(x=>x.id!==id);
    saveGears();
    showToast('削除しました');
    rebuildFilterBar();
    renderGearList();
    buildHome();
    buildPDFList();
    buildGarageMap();

    goBack();
}

function onCategoryChange() {
    const cat = document.getElementById('f-category').value;
    const isTent = cat === 'テント';
    document.getElementById('f-tent-section').style.display   = isTent ? 'block' : 'none';
    document.getElementById('f-features-field').style.display = isTent ? 'block' : 'none';
}

function setEmoji(e) {
    document.getElementById('f-emoji').value = e;
}

function selectDiff(n) {
    document.getElementById('f-difficulty').value = n;
    for (let i=1;i<=5;i++) {
        document.getElementById('ds-'+i).classList.toggle('active', i<=n);
    }
}

function selectGradient(idx) {
    document.getElementById('f-gradient').value = GRADIENT_PRESETS[idx].value;
    document.querySelectorAll('.gradient-preset').forEach((el,i)=>el.classList.toggle('on', i===idx));
}

function toggleTagCheck(key) {
    const el = document.getElementById('tc-'+key);
    el.classList.toggle('on');
}

function getSelectedTentTags() {
    return Object.keys(TENT_TAG_DEF).filter(k=>{
        const el = document.getElementById('tc-'+k);
        return el && el.classList.contains('on');
    });
}

function submitGearForm() {
    const name     = (document.getElementById('f-name').value||'').trim();
    const category = document.getElementById('f-category').value;
    if (!name) { alert('ギア名を入力してください'); return; }
    if (!category) { alert('カテゴリを選択してください'); return; }

    const isTent = category === 'テント';
    const original = editingId ? gears.find(x=>x.id===editingId) : null;

    const data = {
        id:       editingId || generateId(),
        name,
        maker:          (document.getElementById('f-maker').value||'').trim(),
        category,
        emoji:          (document.getElementById('f-emoji').value||'📦').trim(),
        tagline:        (document.getElementById('f-tagline').value||'').trim(),
        storage:        (document.getElementById('f-storage').value||'').trim(),
        setup:          textareaToSteps(document.getElementById('f-setup').value),
        takedown:       textareaToSteps(document.getElementById('f-takedown').value),
        storageMethod:  (document.getElementById('f-storage-method').value||'').trim(),
        caution:        (document.getElementById('f-caution').value||'').trim(),
        pdf:            (document.getElementById('f-pdf').value||'').trim(),
        video:          (document.getElementById('f-video').value||'').trim(),
        specs:          original ? (original.specs||{}) : {},
    };

    if (isTent) {
        data.tentType         = (document.getElementById('f-tent-type').value||'').trim();
        data.features         = (document.getElementById('f-features').value||'').trim();
        data.setupDifficulty  = parseInt(document.getElementById('f-difficulty').value)||3;
        data.recommendedPeople= (document.getElementById('f-people').value||'').trim();
        data.photoGradient    = document.getElementById('f-gradient').value;
        data.tentTags         = getSelectedTentTags();
    }

    if (editingId) {
        const idx = gears.findIndex(x=>x.id===editingId);
        if (idx!==-1) gears[idx] = data;
    } else {
        gears.push(data);
    }

    saveGears();
    showToast(editingId ? '保存しました ✓' : 'ギアを追加しました ✓');
    rebuildFilterBar();
    renderGearList();
    buildHome();
    buildPDFList();
    buildGarageMap();
    updateHomeStats();
    cancelEdit();
}

function deleteGearFromForm() {
    if (!editingId) return;
    const g = gears.find(x=>x.id===editingId);
    if (!g) return;
    if (!confirm(`「${g.name}」を削除しますか？\n\nこの操作は元に戻せません。`)) return;
    gears = gears.filter(x=>x.id!==editingId);
    saveGears();
    showToast('削除しました');
    rebuildFilterBar();
    renderGearList();
    buildHome();
    buildPDFList();
    buildGarageMap();
    updateHomeStats();
    // Go back two levels (edit form -> detail/list)
    historyStack.pop();
    goBack();
}

// RESET TO DEFAULTS
// ============================================================
function resetToDefaults() {
    if (!confirm('全てのデータをデモデータに戻しますか？\n\n追加・編集・削除した内容は全て失われます。\nこの操作は元に戻せません。')) return;
    localStorage.removeItem(STORAGE_KEY);
    gears = JSON.parse(JSON.stringify(DEFAULT_GEARS));
    saveGears();
    filterCat = 'all';
    compTags.clear();
    rebuildFilterBar();
    renderGearList();

    buildPDFList();

// ============================================================
// PDF LIST
// ============================================================
function openPDF(path) {
    window.open(path, '_blank', 'noopener');
}

// manuals.js の MANUALS_REGISTRY を参照して PDF パスを返す。
// なければギアデータの pdfPath にフォールバック。
function getPDFPath(g) {
    if (typeof MANUALS_REGISTRY !== 'undefined' && MANUALS_REGISTRY[g.id]) {
        return MANUALS_REGISTRY[g.id].path;
    }
    return g.pdfPath || null;
}

// ギア詳細画面の「取扱説明書」行
function pdfRowHTML(g) {
    const path = getPDFPath(g);
    if (!path && !g.pdf) return '';
    if (path) {
        return `<div class="info-row" style="cursor:pointer;" onclick="openPDF('${path}')">` +
               `<span class="info-label">取扱説明書</span>` +
               `<span class="info-value" style="color:var(--accent-brown);text-decoration:underline;">` +
               `📗 ${esc(g.pdf || '取扱説明書を開く')}</span></div>`;
    }
    return `<div class="info-row"><span class="info-label">取扱説明書</span>` +
           `<span class="info-value" style="color:var(--text-muted);font-style:italic;">📋 未登録</span></div>`;
}

// ============================================================
// PDF LIST
// ============================================================
function setPDFFilter(btn, cat) {
    pdfFilterCat = cat;
    document.querySelectorAll('#pdf-filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPDFList();
}

function buildPDFList() {
    // フィルターバーを動的に構築（ギアのカテゴリから生成）
    const cats = [...new Set(gears.map(g => g.category).filter(Boolean))].sort();
    document.getElementById('pdf-filter-bar').innerHTML =
        `<button class="filter-btn${pdfFilterCat==='all'?' active':''}" onclick="setPDFFilter(this,'all')">すべて</button>` +
        cats.map(c =>
            `<button class="filter-btn${pdfFilterCat===c?' active':''}" onclick="setPDFFilter(this,'${c.replace(/'/g,'\\\'')}')">${CAT_ICONS[c]||'📋'} ${esc(c)}</button>`
        ).join('');
    renderPDFList();
}

function renderPDFList() {
    const filtered = pdfFilterCat === 'all' ? gears : gears.filter(g => g.category === pdfFilterCat);
    const registeredCount   = filtered.filter(g => !!getPDFPath(g)).length;
    const unregisteredCount = filtered.length - registeredCount;

    // 件数サマリー
    document.getElementById('pdf-count-summary').innerHTML = `
        <div class="pdf-count-row">
            <div class="pdf-count-block">
                <div class="pdf-count-num" style="color:var(--green-text);">${registeredCount}</div>
                <div class="pdf-count-label">📗 登録済み</div>
            </div>
            <div class="pdf-count-block">
                <div class="pdf-count-num" style="color:var(--text-muted);">${unregisteredCount}</div>
                <div class="pdf-count-label">📋 未登録</div>
            </div>
        </div>`;

    // PDFカード一覧
    document.getElementById('pdf-list-items').innerHTML = filtered.map(g => {
        const pdfPath = getPDFPath(g);
        const hasPdf  = !!pdfPath;
        const badge   = hasPdf
            ? `<span class="pdf-status-badge registered">✓ PDF登録済み</span>`
            : `<span class="pdf-status-badge unregistered">取扱説明書未登録</span>`;
        const btn = hasPdf
            ? `<button class="pdf-btn" onclick="event.stopPropagation();openPDF('${pdfPath}')">開く</button>`
            : `<button class="pdf-btn" style="opacity:0.35;cursor:default;" disabled>未登録</button>`;
        return `
        <div class="pdf-card" onclick="${hasPdf ? `openPDF('${pdfPath}')` : ''}" style="${hasPdf ? 'cursor:pointer;' : ''}">
            <div class="pdf-icon">${hasPdf ? '📗' : '📋'}</div>
            <div class="pdf-info">
                <div class="pdf-name">${esc(g.name)}</div>
                <div class="pdf-maker">${esc(g.maker)}　・　${esc(g.category)}</div>
                ${badge}
            </div>
            ${btn}
        </div>`;
    }).join('') || '<div class="card" style="text-align:center;color:var(--text-muted);padding:40px 16px;">該当するギアがありません</div>';
}

// ============================================================
// CHECKLIST
// ============================================================
function buildChecklist() {
    document.getElementById('checklist-items').innerHTML = CHECKLIST.map((cat,ci)=>`
        <div>
            <div class="cat-header">${cat.cat}</div>
            ${cat.items.map((item,ii)=>{
                const key     = `${ci}-${ii}`;
                const checked = !!checkState[key];
                return `<div class="check-item${checked?' checked':''}" id="ci-${key}" onclick="toggleCheck('${key}')">
                    <div class="check-box">${checked?'✓':''}</div>
                    <span class="check-text">${esc(item)}</span>
                </div>`;
            }).join('')}
        </div>`).join('');
    updateProgress();
}

function toggleCheck(key) {
    checkState[key] = !checkState[key];
    const el      = document.getElementById('ci-'+key);
    const checked = checkState[key];
    el.classList.toggle('checked', checked);
    el.querySelector('.check-box').textContent = checked ? '✓' : '';
    updateProgress();
}

function updateProgress() {
    let total=0, done=0;
    CHECKLIST.forEach((cat,ci)=>{ cat.items.forEach((_,ii)=>{ total++; if(checkState[`${ci}-${ii}`]) done++; }); });
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById('check-pct').textContent   = pct+'%';
    document.getElementById('check-sub').textContent   = `${done} / ${total} チェック済`;
    document.getElementById('progress-fill').style.width = pct+'%';
    document.getElementById('home-checked').textContent = done;
}

function resetChecklist() {
    if (!confirm('チェックをリセットしますか？')) return;
    Object.keys(checkState).forEach(k=>delete checkState[k]);
    buildChecklist();
}

// ============================================================
// GARAGE MAP (dynamic)
// ============================================================
function buildGarageMap() {
    // Group gears by storage location
    const groups = {};
    GARAGE_LOCATION_MAP.forEach(loc=>{ groups[loc.key] = []; });
    groups['その他'] = [];

    gears.forEach(g=>{
        const s = g.storage||'';
        let placed = false;
        for (const loc of GARAGE_LOCATION_MAP) {
            if (s.includes(loc.key)) { groups[loc.key].push(g); placed=true; break; }
        }
        if (!placed) groups['その他'].push(g);
    });

    // Build visual map
    const mapVisual = document.getElementById('garage-map-visual');
    mapVisual.innerHTML = `
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-align:center;margin-bottom:12px;">— ガレージ平面図 —</div>
        <div class="map-grid">
            ${GARAGE_LOCATION_MAP.map(loc=>`
            <div class="map-cell${loc.key==='床置き'?' full':''}" onclick="openGarageArea('g-${loc.id}')">
                <div class="map-cell-icon">${loc.icon}</div>
                <div class="map-cell-name">${loc.name}</div>
                <div class="map-cell-desc">${groups[loc.key].length}点</div>
            </div>`).join('')}
            ${groups['その他'].length ? `<div class="map-cell full" onclick="openGarageArea('g-other')">
                <div class="map-cell-icon">📋</div>
                <div class="map-cell-name">その他</div>
                <div class="map-cell-desc">${groups['その他'].length}点</div>
            </div>` : ''}
        </div>`;

    // Build area list
    const allAreas = [
        ...GARAGE_LOCATION_MAP.map(loc=>({ id:'g-'+loc.id, icon:loc.icon, name:loc.name, desc:loc.desc, list:groups[loc.key] })),
        ...(groups['その他'].length ? [{ id:'g-other', icon:'📋', name:'その他', desc:'エリア未設定', list:groups['その他'] }] : []),
    ].filter(a=>a.list.length>0);

    document.getElementById('garage-areas').innerHTML = allAreas.map(area=>`
        <div class="garage-area" id="${area.id}">
            <div class="area-header" onclick="toggleArea('${area.id}')">
                <div class="area-title">
                    <span class="area-icon">${area.icon}</span>
                    <div><div>${area.name}</div><div class="area-desc">${area.desc}</div></div>
                </div>
                <div style="display:flex;align-items:center;gap:4px;">
                    <span class="area-badge">${area.list.length}点</span>
                    <span class="area-chevron">›</span>
                </div>
            </div>
            <div class="area-items">
                ${area.list.map(g=>`
                <div class="area-item" onclick="showGearDetail('${g.id}')">
                    <span class="area-item-emoji">${esc(g.emoji||'📦')}</span>
                    <div>
                        <div class="area-item-name">${esc(g.name)}</div>
                        <div class="area-item-meta">${esc(g.maker)}　・　${esc(g.category)}</div>
                    </div>
                    <span class="area-item-arrow">›</span>
                </div>`).join('')}
            </div>
        </div>`).join('');
}

function toggleArea(id) { document.getElementById(id).classList.toggle('expanded'); }

function openGarageArea(id) {
    const el = document.getElementById(id);
    if (el) { el.classList.add('expanded'); setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),50); }
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', ()=>{
    gears = loadGears();
    saveGears(); // ensure persisted
    rebuildFilterBar();
    renderGearList();
    buildHome();
    buildPDFList();
    buildChecklist();
    buildGarageMap();
    updateHomeStats();
});
</script>
